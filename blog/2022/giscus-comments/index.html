> <a href="/cv/">cv</a> </div> </nav> <main class="site-main"> <div class="post"> <header class="post-header"> <h1 class="post-title">a post with giscus comments</h1> <p class="post-meta"> Created on December 10, 2022 </p> <p class="post-tags"> <a href="/blog/2022"> <i class="fa-solid fa-calendar fa-sm"></i> 2022 </a>   ·   <a href="/blog/tag/comments"> <i class="fa-solid fa-hashtag fa-sm"></i> comments</a>   ·   <a href="/blog/category/sample-posts"> <i class="fa-solid fa-tag fa-sm"></i> sample-posts</a>   <a href="/blog/category/external-services"> <i class="fa-solid fa-tag fa-sm"></i> external-services</a> </p> </header> <article class="post-content"> <div id="markdown-content"> <p>This post shows how to add GISCUS comments.</p> </div> </article> <div id="giscus_thread" style="max-width: 930px; margin: 0 auto;"> <br> <script defer src="/assets/js/giscus-setup.js"></script> <noscript> Please enable JavaScript to view the <a href="http://giscus.app/?ref_noscript" rel="external nofollow noopener" target="_blank">comments powered by giscus.</a> </noscript> </div> </div> </main> <footer class="site-footer"> © 2026 Nandini Banerjee · <a href="mailto:nbanerje@nd.edu">nbanerje@nd.edu</a> </footer> <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script> <script src="/assets/js/bootstrap.bundle.min.js"></script> <script src="https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/js/mdb.min.js" integrity="sha256-NdbiivsvWt7VYCt6hYNT3h/th9vSTL4EDWeGs5SN3DA=" crossorigin="anonymous"></script> <script defer src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" integrity="sha256-Nn1q/fx0H7SNLZMQ5Hw5JLaTRZp0yILA/FRexe19VdI=" crossorigin="anonymous"></script> <script defer src="https://cdn.jsdelivr.net/npm/imagesloaded@5.0.0/imagesloaded.pkgd.min.js" integrity="sha256-htrLFfZJ6v5udOG+3kNLINIKh2gvoKqwEhHYfTTMICc=" crossorigin="anonymous"></script> <script defer src="/assets/js/masonry.js?v=a0db7e5d5c70cc3252b3138b0c91dcaf" type="text/javascript"></script> <script defer src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js" integrity="sha256-ZgMyDAIYDYGxbcpJcfUnYwNevG/xi9OHKaR/8GK+jWc=" crossorigin="anonymous"></script> <script defer src="/assets/js/zoom.js?v=85ddb88934d28b74e78031fd54cf8308"></script> <script src="/assets/js/no_defer.js?v=2781658a0a2b13ed609542042a859126"></script> <script defer src="/assets/js/common.js?v=c15de51d4bb57887caa2c21988d97279"></script> <script defer src="/assets/js/copy_code.js?v=c8a01c11a92744d44b093fc3bda915df" type="text/javascript"></script> <script defer src="/assets/js/jupyter_new_tab.js?v=d9f17b6adc2311cbabd747f4538bb15f"></script> <script async src="https://d1bxh8uas1mnw7.cloudfront.net/assets/embed.js"></script> <script async src="https://badge.dimensions.ai/badge.js"></script> <script defer type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js" integrity="sha256-MASABpB4tYktI2Oitl4t+78w/lyA+D7b/s9GEP0JOGI=" crossorigin="anonymous"></script> <script src="/assets/js/mathjax-setup.js?v=a5bb4e6a542c546dd929b24b8b236dfd"></script> <script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6" crossorigin="anonymous"></script> <script defer src="/assets/js/progress-bar.js?v=2f30e0e6801ea8f5036fa66e1ab0a71a" type="text/javascript"></script> <script src="/assets/js/vanilla-back-to-top.min.js?v=f40d453793ff4f64e238e420181a1d17"></script> <script>

  </script> <script>
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, nodes, edges, tick = 0;
      const pal = {
        nodes: ['#26547c','#ef476f','#ffd166','#4a7fa8','#f47d96','#ffe099'],
        bg: ['#eef4fa','#fffbf0'],
        edgeActive: '#ef476f', edgeInactive: '#b8cfe0'
      };
      function resize() {
        W = window.innerWidth;
        H = Math.max(document.body.scrollHeight, window.innerHeight);
        canvas.width = W; canvas.height = H;
      }
      function init() {
        resize();
        const count = 64;
        nodes = Array.from({length: count}, () => ({
          x: Math.random()*W, y: Math.random()*H,
          r: 2 + Math.random()*3,
          vx: (Math.random()-0.5)*0.22, vy: (Math.random()-0.5)*0.22,
          color: pal.nodes[Math.floor(Math.random()*pal.nodes.length)],
          pulse: Math.random()*Math.PI*2,
          pulseSpeed: 0.01+Math.random()*0.014,
          active: Math.random()<0.15,
        }));
        edges = [];
        for (let i=0;i<count;i++)
          for (let j=i+1;j<count;j++) {
            const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
            if (Math.sqrt(dx*dx+dy*dy)<130) edges.push([i,j]);
          }
      }
      function draw() {
        ctx.clearRect(0,0,W,H);
        const g=ctx.createLinearGradient(0,0,W,H);
        g.addColorStop(0,pal.bg[0]); g.addColorStop(1,pal.bg[1]);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        tick++;
        if (tick%65===0) nodes[Math.floor(Math.random()*nodes.length)].active=true;
        nodes.forEach((n,i)=>{
          if (n.active) edges.forEach(([a,b])=>{
            const o=a===i?nodes[b]:b===i?nodes[a]:null;
            if (o&&!o.active&&Math.random()<0.003) o.active=true;
          });
        });
        edges.forEach(([i,j])=>{
          const ni=nodes[i],nj=nodes[j],both=ni.active&&nj.active;
          ctx.beginPath(); ctx.moveTo(ni.x,ni.y); ctx.lineTo(nj.x,nj.y);
          ctx.strokeStyle=both?pal.edgeActive:pal.edgeInactive;
          ctx.globalAlpha=both?0.10:0.04;
          ctx.lineWidth=both?1:0.5;
          ctx.stroke(); ctx.globalAlpha=1;
        });
        nodes.forEach(n=>{
          n.pulse+=n.pulseSpeed;
          n.x+=n.vx; n.y+=n.vy;
          if (n.x<0||n.x>W) n.vx*=-1;
          if (n.y<0||n.y>H) n.vy*=-1;
          const pr=n.r*(n.active?1+0.28*Math.sin(n.pulse):1);
          if (n.active){
            ctx.beginPath(); ctx.arc(n.x,n.y,pr+5,0,Math.PI*2);
            ctx.fillStyle=n.color; ctx.globalAlpha=0.06; ctx.fill(); ctx.globalAlpha=1;
          }
          ctx.beginPath(); ctx.arc(n.x,n.y,pr,0,Math.PI*2);
          ctx.fillStyle=n.color;
          ctx.globalAlpha=n.active?0.25:0.10;
          ctx.fill(); ctx.globalAlpha=1;
        });
        requestAnimationFrame(draw);
      }
      init(); draw();
      window.addEventListener('resize', init);
    </script> </body> </html>
